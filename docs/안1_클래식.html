<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>안1 - 클래식 좌우 대치</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; }
.screen {
    width: 1280px; height: 720px; background: #16213e;
    position: relative; overflow: hidden; border: 2px solid #444;
}

/* 배경 그리드 */
.screen::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,255,255,0.03) 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,255,255,0.03) 40px);
}

/* 상단 HUD */
.hud {
    position: absolute; top: 0; left: 0; right: 0; height: 60px;
    background: rgba(0,0,0,0.6); display: flex; align-items: center;
    padding: 0 24px; justify-content: space-between; z-index: 10;
}
.floor-label { color: #0ff; font: bold 20px monospace; }
.hp-bar-wrap {
    width: 300px; height: 24px; background: #333; border-radius: 4px;
    border: 1px solid #555; overflow: hidden; position: relative;
}
.hp-bar { width: 80%; height: 100%; background: linear-gradient(90deg, #e74c3c, #e67e22); }
.hp-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: white; font: bold 13px monospace; }
.shield-boost { color: #aaa; font: 14px monospace; }

/* 플레이어 영역 (왼쪽) */
.player-area {
    position: absolute; left: 60px; top: 140px; width: 200px; height: 300px;
    display: flex; flex-direction: column; align-items: center;
}
.player-sprite {
    width: 160px; height: 200px; background: #2a2a4a;
    border: 2px solid #0ff; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #0ff; font: 14px monospace;
}

/* 적 영역 (오른쪽) */
.enemy-area {
    position: absolute; right: 40px; top: 100px; width: 400px;
    display: flex; gap: 20px; justify-content: center;
}
.enemy {
    width: 150px; display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.enemy-sprite {
    width: 120px; height: 140px; background: #3a1a1a;
    border: 2px solid #e74c3c; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #e74c3c; font: 12px monospace; text-align: center;
}
.enemy-hp {
    width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden;
}
.enemy-hp-fill { height: 100%; background: #e74c3c; }
.enemy-intent {
    background: rgba(255,100,100,0.2); border: 1px solid #e74c3c;
    border-radius: 4px; padding: 4px 10px; color: #ff6b6b;
    font: bold 12px monospace;
}

/* 카드 영역 (하단) */
.card-area {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 16px; align-items: flex-end;
}
.card {
    width: 120px; height: 160px; border-radius: 10px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 8px; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 2px solid rgba(255,255,255,0.3);
}
.card:hover { transform: translateY(-16px); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
.card.selected { transform: translateY(-20px); border-color: white; box-shadow: 0 0 20px rgba(255,255,255,0.3); }
.card-atk { background: linear-gradient(135deg, #c0392b, #e74c3c); }
.card-blk { background: linear-gradient(135deg, #1a5276, #2980b9); }
.card-bst { background: linear-gradient(135deg, #b7950b, #f1c40f); }
.card-hel { background: linear-gradient(135deg, #1e8449, #27ae60); }
.card-type { color: white; font: bold 14px monospace; opacity: 0.8; }
.card-value { color: white; font: bold 40px monospace; }

/* 확정 버튼 */
.confirm-btn {
    position: absolute; bottom: 200px; left: 50%; transform: translateX(-50%);
    background: #0ff; color: #1a1a2e; border: none; padding: 12px 40px;
    font: bold 16px monospace; border-radius: 8px; cursor: pointer;
}
.confirm-btn:hover { background: #00dddd; }

/* 턴 표시 */
.turn-label {
    position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.3); font: bold 14px monospace;
}
</style>
</head>
<body>
<div class="screen">
    <!-- HUD -->
    <div class="hud">
        <span class="floor-label">FLOOR 04</span>
        <div style="display:flex;align-items:center;gap:16px;">
            <div class="hp-bar-wrap">
                <div class="hp-bar"></div>
                <div class="hp-text">HP 24 / 30</div>
            </div>
            <span class="shield-boost">Shield 3 | Boost x1</span>
        </div>
    </div>
    <div class="turn-label">TURN 3</div>

    <!-- 플레이어 -->
    <div class="player-area">
        <div class="player-sprite">주인공<br>스프라이트</div>
    </div>

    <!-- 적 -->
    <div class="enemy-area">
        <div class="enemy">
            <div class="enemy-intent">ATK 4</div>
            <div class="enemy-sprite">강습 드론</div>
            <div class="enemy-hp"><div class="enemy-hp-fill" style="width:65%"></div></div>
            <span style="color:#aaa;font:11px monospace;">HP 13/20</span>
        </div>
        <div class="enemy">
            <div class="enemy-intent">ATK 5</div>
            <div class="enemy-sprite">정찰 드론</div>
            <div class="enemy-hp"><div class="enemy-hp-fill" style="width:40%"></div></div>
            <span style="color:#aaa;font:11px monospace;">HP 6/15</span>
        </div>
    </div>

    <!-- 확정 버튼 -->
    <button class="confirm-btn">확정</button>

    <!-- 카드 핸드 -->
    <div class="card-area">
        <div class="card card-atk selected"><span class="card-type">ATK</span><span class="card-value">2</span></div>
        <div class="card card-blk"><span class="card-type">BLK</span><span class="card-value">1</span></div>
        <div class="card card-atk selected"><span class="card-type">ATK</span><span class="card-value">1</span></div>
        <div class="card card-hel"><span class="card-type">HEL</span><span class="card-value">2</span></div>
        <div class="card card-atk selected"><span class="card-type">ATK</span><span class="card-value">1</span></div>
    </div>
</div>
</body>
</html>
