<svg xmlns="http://www.w3.org/2000/svg" width="640" height="520" viewBox="0 0 640 520">
  <rect width="640" height="520" fill="#0F1620"/>

  <text x="320" y="42" font-family="Apple SD Gothic Neo, -apple-system, sans-serif"
        font-size="22" font-weight="600" fill="#E8EEF5" text-anchor="middle">
    안 C — 각진 아웃라인 (절제판)
  </text>
  <line x1="60" y1="68" x2="580" y2="68" stroke="#1F2A3A" stroke-width="1"/>

  <!-- 시작 (HOVER) -->
  <g transform="translate(140, 110)">
    <polygon points="10,0 350,0 360,10 360,54 350,64 10,64 0,54 0,10"
             fill="#FFFFFF" fill-opacity="0.05"
             stroke="#E8EEF5" stroke-width="1"/>
    <text x="320" y="16" font-family="Menlo, monospace"
          font-size="9" fill="#5BC0EC" letter-spacing="1">// 01</text>
    <text x="180" y="41" font-family="Apple SD Gothic Neo, sans-serif"
          font-size="22" font-weight="500" fill="#FFFFFF"
          text-anchor="middle" letter-spacing="2">시작</text>
  </g>

  <!-- 불러오기 (NORMAL) -->
  <g transform="translate(140, 200)">
    <polygon points="10,0 350,0 360,10 360,54 350,64 10,64 0,54 0,10"
             fill="#FFFFFF" fill-opacity="0.02"
             stroke="#5C6878" stroke-width="1"/>
    <text x="320" y="16" font-family="Menlo, monospace"
          font-size="9" fill="#3A6E8A" letter-spacing="1">// 02</text>
    <text x="180" y="41" font-family="Apple SD Gothic Neo, sans-serif"
          font-size="22" font-weight="500" fill="#C8D2DE"
          text-anchor="middle" letter-spacing="2">불러오기</text>
  </g>

  <!-- 종료 (NORMAL) -->
  <g transform="translate(140, 290)">
    <polygon points="10,0 350,0 360,10 360,54 350,64 10,64 0,54 0,10"
             fill="#FFFFFF" fill-opacity="0.02"
             stroke="#5C6878" stroke-width="1"/>
    <text x="320" y="16" font-family="Menlo, monospace"
          font-size="9" fill="#3A6E8A" letter-spacing="1">// 03</text>
    <text x="180" y="41" font-family="Apple SD Gothic Neo, sans-serif"
          font-size="22" font-weight="500" fill="#C8D2DE"
          text-anchor="middle" letter-spacing="2">종료</text>
  </g>

  <text x="320" y="430" font-family="Apple SD Gothic Neo, sans-serif"
        font-size="13" fill="#6A7A8E" text-anchor="middle">
    1px 컷코너 아웃라인 + 우상단 인덱스 마커. 호버 시 외곽 흰색 + 마커 시안
  </text>
  <text x="320" y="452" font-family="Apple SD Gothic Neo, sans-serif"
        font-size="12" fill="#48566A" text-anchor="middle">
    원래 안 1의 절제 버전. 로고의 각진 타이포와 맞으면서 덜 시끄러움
  </text>
</svg>
