<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Hand 03 — Split by Arm (좌우 팔 분리)</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background:#0a0a12; font-family:"Apple SD Gothic Neo",-apple-system,sans-serif;
    min-height:100vh; display:flex; justify-content:center; align-items:center; color:#eaeef7; }
.stage { width:1280px; height:720px; position:relative; overflow:hidden;
    box-shadow:0 0 40px rgba(0,0,0,0.8); background:#0a0c14; }
.stage .bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    filter:brightness(0.55) contrast(1.05); }
.stage .vignette { position:absolute; inset:0;
    background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.75) 100%);
    pointer-events:none; }
.hud { position:absolute; top:0; left:0; right:0; height:86px;
    background:linear-gradient(180deg,rgba(10,15,25,0.96),rgba(10,15,25,0.55));
    border-bottom:1px solid rgba(180,200,230,0.25); z-index:10; }
.hud .note { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-size:11px; letter-spacing:0.25em; color:rgba(180,200,230,0.4); }
.mockup-label { position:absolute; top:96px; right:20px; font-size:11px;
    letter-spacing:0.15em; color:rgba(255,220,160,0.8); z-index:20; }
.mockup-desc { position:absolute; top:114px; right:20px; font-size:10px;
    letter-spacing:0.1em; color:rgba(200,220,240,0.5); z-index:20; text-align:right; }
.heroine { position:absolute; left:60px; bottom:40px; height:500px;
    filter:brightness(0.85) drop-shadow(0 8px 18px rgba(0,0,0,0.7)); z-index:3; }
.enemy-wrap { position:absolute; right:-40px; bottom:40px; z-index:3; }
.enemy-wrap img { height:560px; object-fit:contain;
    filter:brightness(0.7) drop-shadow(0 8px 24px rgba(120,40,180,0.5)); }
.end-turn { position:absolute; bottom:200px; right:30px; padding:12px 24px;
    background:linear-gradient(180deg,#4a3a22,#2a1f12); border:2px solid #c9a060;
    color:#ffd88a; font-size:14px; font-weight:700; font-family:inherit;
    letter-spacing:0.1em; border-radius:4px; z-index:6; }

/* === 좌·우 팔 라벨 (그룹 표시) === */
.arm-tag {
    position:absolute;
    bottom:176px;
    font-size:11px; letter-spacing:0.3em; font-weight:700;
    padding:4px 14px; border-radius:3px; z-index:7;
    text-shadow:0 1px 2px rgba(0,0,0,0.9);
}
.arm-tag.l { left:60px;  color:#ffd8a8; background:rgba(200,120,60,0.4); border:1px solid rgba(255,180,110,0.55); }
.arm-tag.r { right:60px; color:#ffd8a8; background:rgba(200,120,60,0.4); border:1px solid rgba(255,180,110,0.55); }

/* === 핸드 좌/우 그룹 === */
.hand-l, .hand-r {
    position:absolute;
    bottom:-20px;
    width:380px; height:220px;
    z-index:6;
}
.hand-l { left:30px; }
.hand-r { right:30px; }

.card {
    position:absolute;
    width:130px; height:180px;
    border-radius:10px; padding:10px;
    display:flex; flex-direction:column;
    box-shadow:0 6px 16px rgba(0,0,0,0.7);
    transition:transform .2s, filter .2s;
    cursor:pointer;
    bottom:0;
}
.card:hover { filter:brightness(1.15); z-index:30 !important; }

.card.atk { background:linear-gradient(180deg,#5d2030,#3a1220); border:2px solid #c85060; }
.card.def { background:linear-gradient(180deg,#1f3d5d,#12223a); border:2px solid #5083c8; }

.card .cost { position:absolute; top:-8px; left:-8px; width:32px; height:32px;
    background:radial-gradient(circle at 30% 30%,#7ed1ff,#1e5a9a);
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-weight:700; color:#fff; border:2px solid #fff;
    box-shadow:0 0 8px rgba(100,180,255,0.5); }
.card.L::after { content:"L"; position:absolute; top:6px; right:8px;
    color:rgba(120,180,255,0.9); font-weight:700; font-size:13px; }
.card.R::after { content:"R"; position:absolute; top:6px; right:8px;
    color:rgba(255,140,120,0.9); font-weight:700; font-size:13px; }
.card .name { font-size:13px; font-weight:700; text-align:center; margin-top:6px;
    margin-bottom:4px; color:#fff; }
.card .art { flex:1; background:rgba(0,0,0,0.4); border-radius:4px;
    display:flex; align-items:center; justify-content:center;
    font-size:30px; color:rgba(255,255,255,0.25); margin:4px 0; }
.card .effects { font-size:10px; color:#e8e8e8; line-height:1.45; text-align:center; }
.card .effects .dmg { color:#ff9a90; font-weight:700; }
.card .effects .blk { color:#8cc5ff; font-weight:700; }
.card .effects .self { color:#d0a0b0; }

/* === L 그룹: 안쪽(우)로 기울며 펼쳐짐 === */
/* 좌측에서 우측으로 갈수록 약간 더 오른쪽 상단으로 — 손에 쥐고 상대방쪽을 향하는 모양 */
.hand-l .card { transform-origin:center 260px; left:0; }
.hand-l .l1 { transform:translateX(0)    translateY(20px) rotate(-12deg); z-index:1; }
.hand-l .l2 { transform:translateX(90px) translateY(6px)  rotate(-5deg);  z-index:2; }
.hand-l .l3 { transform:translateX(180px) translateY(0)   rotate(2deg);   z-index:3; }

/* === R 그룹: 좌로 기울며 펼쳐짐 (대칭) === */
.hand-r .card { transform-origin:center 260px; right:0; }
.hand-r .r1 { transform:translateX(-180px) translateY(0)   rotate(-2deg); z-index:3; }
.hand-r .r2 { transform:translateX(-90px)  translateY(6px) rotate(5deg);  z-index:2; }
.hand-r .r3 { transform:translateX(0)      translateY(20px) rotate(12deg); z-index:1; }

/* 중앙 비워서 히로인 보이게 함 */
.center-gap-guide {
    position:absolute;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    width:200px; height:180px;
    border:1px dashed rgba(255,255,255,0.08);
    border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    color:rgba(255,255,255,0.15);
    font-size:10px; letter-spacing:0.2em;
    z-index:4;
    pointer-events:none;
}
</style>
</head>
<body>
<div class="stage">
    <img class="bg" src="../에셋/배틀 리소스/배경/배경1.png">
    <div class="vignette"></div>
    <div class="hud"><div class="note">HUD · HP · 에너지 · 적 · 덱</div></div>
    <div class="mockup-label">HAND 03 · SPLIT BY ARM</div>
    <div class="mockup-desc">L팔/R팔 좌우 분리 팬 · 고유 디자인<br>중앙 비움 · 히로인 가시성 ↑ · 팔 시스템과 시각 일치</div>

    <img class="heroine" src="../에셋/타이틀/1.png">
    <div class="enemy-wrap">
        <img src="../에셋/배틀 리소스/예시 적/몬스터 예시.png">
    </div>

    <div class="arm-tag l">L · 좌팔</div>
    <div class="arm-tag r">R · 우팔</div>

    <div class="center-gap-guide">CENTER GAP</div>

    <!-- L 팔 카드 3장 -->
    <div class="hand-l">
        <div class="card atk L l1">
            <div class="cost">4</div>
            <div class="name">강펀치</div>
            <div class="art">✊</div>
            <div class="effects"><span class="dmg">데미지 40</span><br><span class="self">반동 -20</span></div>
        </div>
        <div class="card def L l2">
            <div class="cost">1</div>
            <div class="name">약가드</div>
            <div class="art">🛡</div>
            <div class="effects"><span class="blk">블록 40</span></div>
        </div>
        <div class="card def L l3">
            <div class="cost">2</div>
            <div class="name">중가드</div>
            <div class="art">🛡</div>
            <div class="effects"><span class="blk">블록 80</span></div>
        </div>
    </div>

    <!-- R 팔 카드 3장 -->
    <div class="hand-r">
        <div class="card atk R r1">
            <div class="cost">2</div>
            <div class="name">중펀치</div>
            <div class="art">✊</div>
            <div class="effects"><span class="dmg">데미지 20</span><br><span class="self">반동 -10</span></div>
        </div>
        <div class="card atk R r2">
            <div class="cost">1</div>
            <div class="name">약펀치</div>
            <div class="art">✊</div>
            <div class="effects"><span class="dmg">데미지 10</span></div>
        </div>
        <div class="card atk R r3">
            <div class="cost">4</div>
            <div class="name">강펀치</div>
            <div class="art">✊</div>
            <div class="effects"><span class="dmg">데미지 40</span><br><span class="self">반동 -20</span></div>
        </div>
    </div>

    <button class="end-turn">턴 종료</button>
</div>
</body>
</html>
