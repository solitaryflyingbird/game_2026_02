<svg xmlns="http://www.w3.org/2000/svg" width="640" height="520" viewBox="0 0 640 520">
  <rect width="640" height="520" fill="#0F1620"/>

  <text x="320" y="42" font-family="Apple SD Gothic Neo, -apple-system, sans-serif"
        font-size="22" font-weight="600" fill="#E8EEF5" text-anchor="middle">
    안 D — 더블 라인 / 터미널
  </text>
  <line x1="60" y1="68" x2="580" y2="68" stroke="#1F2A3A" stroke-width="1"/>

  <!-- 시작 (HOVER) -->
  <g transform="translate(140, 110)">
    <line x1="0" y1="0.5" x2="360" y2="0.5" stroke="#E8EEF5" stroke-width="1"/>
    <line x1="0" y1="63.5" x2="360" y2="63.5" stroke="#E8EEF5" stroke-width="1"/>
    <polygon points="14,28 26,32 14,36" fill="#5BC0EC"/>
    <text x="44" y="41" font-family="Apple SD Gothic Neo, sans-serif"
          font-size="22" font-weight="500" fill="#FFFFFF"
          letter-spacing="3">시작</text>
    <text x="346" y="41" font-family="Menlo, monospace"
          font-size="10" fill="#5BC0EC" text-anchor="end">[ENTER]</text>
  </g>

  <!-- 불러오기 (NORMAL) -->
  <g transform="translate(140, 200)">
    <line x1="0" y1="0.5" x2="360" y2="0.5" stroke="#3A4858" stroke-width="1"/>
    <line x1="0" y1="63.5" x2="360" y2="63.5" stroke="#3A4858" stroke-width="1"/>
    <polygon points="14,28 24,32 14,36" fill="#3A6E8A"/>
    <text x="44" y="41" font-family="Apple SD Gothic Neo, sans-serif"
          font-size="22" font-weight="500" fill="#C8D2DE"
          letter-spacing="3">불러오기</text>
  </g>

  <!-- 종료 (NORMAL) -->
  <g transform="translate(140, 290)">
    <line x1="0" y1="0.5" x2="360" y2="0.5" stroke="#3A4858" stroke-width="1"/>
    <line x1="0" y1="63.5" x2="360" y2="63.5" stroke="#3A4858" stroke-width="1"/>
    <polygon points="14,28 24,32 14,36" fill="#3A6E8A"/>
    <text x="44" y="41" font-family="Apple SD Gothic Neo, sans-serif"
          font-size="22" font-weight="500" fill="#C8D2DE"
          letter-spacing="3">종료</text>
  </g>

  <text x="320" y="430" font-family="Apple SD Gothic Neo, sans-serif"
        font-size="13" fill="#6A7A8E" text-anchor="middle">
    상하 1px 라인 + 좌측 트라이앵글 마커. 좌우 테두리는 없음
  </text>
  <text x="320" y="452" font-family="Apple SD Gothic Neo, sans-serif"
        font-size="12" fill="#48566A" text-anchor="middle">
    HUD 터미널 톤. 호버 시 라인/마커 흰색화 + 우측 단축키 라벨 등장
  </text>
</svg>
