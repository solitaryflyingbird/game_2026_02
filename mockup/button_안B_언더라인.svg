<svg xmlns="http://www.w3.org/2000/svg" width="640" height="520" viewBox="0 0 640 520">
  <defs>
    <linearGradient id="cardFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.015"/>
    </linearGradient>
    <linearGradient id="cardFillHover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <rect width="640" height="520" fill="#0F1620"/>

  <text x="320" y="42" font-family="Apple SD Gothic Neo, -apple-system, sans-serif"
        font-size="22" font-weight="600" fill="#E8EEF5" text-anchor="middle">
    안 B — 언더라인 카드
  </text>
  <line x1="60" y1="68" x2="580" y2="68" stroke="#1F2A3A" stroke-width="1"/>

  <!-- 시작 (HOVER) -->
  <g transform="translate(140, 110)">
    <rect width="360" height="64" fill="url(#cardFillHover)"/>
    <line x1="0" y1="63.5" x2="360" y2="63.5" stroke="#5BC0EC" stroke-width="2"/>
    <text x="180" y="41" font-family="Apple SD Gothic Neo, sans-serif"
          font-size="22" font-weight="500" fill="#FFFFFF"
          text-anchor="middle" letter-spacing="3">시작</text>
  </g>

  <!-- 불러오기 (NORMAL) -->
  <g transform="translate(140, 200)">
    <rect width="360" height="64" fill="url(#cardFill)"/>
    <line x1="0" y1="63.5" x2="360" y2="63.5" stroke="#3A6E8A" stroke-width="1"/>
    <text x="180" y="41" font-family="Apple SD Gothic Neo, sans-serif"
          font-size="22" font-weight="500" fill="#C8D2DE"
          text-anchor="middle" letter-spacing="3">불러오기</text>
  </g>

  <!-- 종료 (NORMAL) -->
  <g transform="translate(140, 290)">
    <rect width="360" height="64" fill="url(#cardFill)"/>
    <line x1="0" y1="63.5" x2="360" y2="63.5" stroke="#3A6E8A" stroke-width="1"/>
    <text x="180" y="41" font-family="Apple SD Gothic Neo, sans-serif"
          font-size="22" font-weight="500" fill="#C8D2DE"
          text-anchor="middle" letter-spacing="3">종료</text>
  </g>

  <text x="320" y="430" font-family="Apple SD Gothic Neo, sans-serif"
        font-size="13" fill="#6A7A8E" text-anchor="middle">
    상하 그라데이션 + 하단 1px 라인. 호버 시 라인 두께 2px / 시안 + 텍스트 흰색
  </text>
  <text x="320" y="452" font-family="Apple SD Gothic Neo, sans-serif"
        font-size="12" fill="#48566A" text-anchor="middle">
    잡지/UI 스타일. 텍스트 중앙정렬이 깔끔
  </text>
</svg>
