<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>안3 - Slay the Spire 스타일</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; }
.screen {
    width: 1280px; height: 720px; background: #0a0e1a;
    position: relative; overflow: hidden; border: 2px solid #444;
}

/* 배경 */
.bg-grid {
    position: absolute; inset: 0;
    background:
        radial-gradient(ellipse at 50% 80%, rgba(0,255,255,0.03) 0%, transparent 60%),
        linear-gradient(180deg, #0a0e1a 0%, #111827 100%);
}

/* 상단 HUD - 미니멀 */
.hud-top {
    position: absolute; top: 12px; left: 20px; right: 20px;
    display: flex; justify-content: space-between; align-items: center; z-index: 10;
}
.hud-left { display: flex; align-items: center; gap: 16px; }
.floor-badge {
    background: rgba(0,255,255,0.1); border: 1px solid rgba(0,255,255,0.3);
    padding: 6px 16px; border-radius: 6px;
    color: #0ff; font: bold 16px monospace;
}
.turn-badge {
    color: #555; font: 13px monospace;
}

/* 플레이어 상태 - 좌하단 */
.player-panel {
    position: absolute; left: 20px; bottom: 200px;
    display: flex; align-items: flex-end; gap: 16px;
}
.player-sprite {
    width: 160px; height: 200px; background: #111827;
    border: 2px solid #0ff; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #0ff; font: 13px monospace;
    box-shadow: 0 0 20px rgba(0,255,255,0.08);
}
.player-stats {
    display: flex; flex-direction: column; gap: 6px;
}
.stat-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 4px; font: bold 13px monospace;
}
.stat-hp { background: rgba(231,76,60,0.2); color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }
.stat-shield { background: rgba(41,128,185,0.2); color: #3498db; border: 1px solid rgba(41,128,185,0.3); }
.stat-boost { background: rgba(241,196,15,0.2); color: #f1c40f; border: 1px solid rgba(241,196,15,0.3); }

/* 적 - 우측 상단에 세로 배치 */
.enemy-column {
    position: absolute; right: 40px; top: 60px;
    display: flex; flex-direction: column; gap: 20px;
}
.enemy-row {
    display: flex; align-items: center; gap: 12px;
}
.enemy-sprite {
    width: 120px; height: 100px; background: #1a1020;
    border: 1px solid rgba(255,50,50,0.4); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #e74c3c; font: 12px monospace;
}
.enemy-info {
    display: flex; flex-direction: column; gap: 4px;
}
.enemy-name { color: #ff6b6b; font: bold 13px monospace; }
.enemy-hp-bar {
    width: 120px; height: 8px; background: #1a1a2e;
    border-radius: 4px; overflow: hidden; border: 1px solid #333;
}
.enemy-hp-fill { height: 100%; background: #e74c3c; border-radius: 4px; }
.enemy-hp-text { color: #666; font: 11px monospace; }
.enemy-intent-box {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(255,60,60,0.15); border: 1px solid rgba(255,60,60,0.4);
    border-radius: 4px; padding: 2px 8px;
    color: #ff4444; font: bold 12px monospace;
}

/* 카드 - 하단 부채꼴 */
.card-fan {
    position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px;
}
.card {
    width: 130px; height: 180px; border-radius: 12px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 4px; cursor: pointer;
    transition: transform 0.2s;
    border: 2px solid rgba(255,255,255,0.15);
    position: relative;
}
.card:nth-child(1) { transform: rotate(-8deg) translateY(10px); }
.card:nth-child(2) { transform: rotate(-4deg) translateY(3px); }
.card:nth-child(3) { transform: rotate(0deg) translateY(0); }
.card:nth-child(4) { transform: rotate(4deg) translateY(3px); }
.card:nth-child(5) { transform: rotate(8deg) translateY(10px); }
.card:hover { transform: translateY(-40px) rotate(0deg) scale(1.05) !important; z-index: 10; }
.card.selected { transform: translateY(-50px) rotate(0deg) !important; border-color: #fff; z-index: 10;
    box-shadow: 0 0 24px rgba(255,255,255,0.2); }

.card-atk { background: linear-gradient(180deg, #c0392b 0%, #7b241c 100%); }
.card-blk { background: linear-gradient(180deg, #2980b9 0%, #1a5276 100%); }
.card-bst { background: linear-gradient(180deg, #d4ac0d 0%, #7d6608 100%); }
.card-hel { background: linear-gradient(180deg, #27ae60 0%, #145a32 100%); }

.card-icon {
    width: 40px; height: 40px; background: rgba(0,0,0,0.3);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font: bold 16px monospace; color: rgba(255,255,255,0.6);
}
.card-value { color: white; font: bold 48px monospace; line-height: 1; }
.card-type-label { color: rgba(255,255,255,0.5); font: bold 11px monospace; }

/* 확정 버튼 */
.confirm-area {
    position: absolute; bottom: 170px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.combo-preview {
    color: #0ff; font: bold 14px monospace;
    background: rgba(0,255,255,0.08); padding: 4px 16px; border-radius: 4px;
    border: 1px solid rgba(0,255,255,0.2);
}
.confirm-btn {
    background: linear-gradient(135deg, #00cccc, #0ff);
    color: #0a0e1a; border: none; padding: 12px 48px;
    font: bold 16px monospace; border-radius: 8px; cursor: pointer;
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
}
.confirm-btn:hover { box-shadow: 0 0 30px rgba(0,255,255,0.4); }

/* 안내 텍스트 */
.guide-text {
    position: absolute; bottom: 220px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.3); font: 12px monospace;
}
</style>
</head>
<body>
<div class="screen">
    <div class="bg-grid"></div>

    <!-- HUD -->
    <div class="hud-top">
        <div class="hud-left">
            <span class="floor-badge">FLOOR 04</span>
            <span class="turn-badge">TURN 3</span>
        </div>
    </div>

    <!-- 플레이어 -->
    <div class="player-panel">
        <div class="player-sprite">주인공<br>스프라이트</div>
        <div class="player-stats">
            <div class="stat-chip stat-hp">HP 24/30</div>
            <div class="stat-chip stat-shield">SH 3</div>
            <div class="stat-chip stat-boost">BST x1</div>
        </div>
    </div>

    <!-- 적 -->
    <div class="enemy-column">
        <div class="enemy-row">
            <div class="enemy-info">
                <span class="enemy-name">강습 드론</span>
                <div class="enemy-hp-bar"><div class="enemy-hp-fill" style="width:65%"></div></div>
                <span class="enemy-hp-text">HP 13/20</span>
                <span class="enemy-intent-box">ATK 4</span>
            </div>
            <div class="enemy-sprite">강습 드론</div>
        </div>
        <div class="enemy-row">
            <div class="enemy-info">
                <span class="enemy-name">정찰 드론</span>
                <div class="enemy-hp-bar"><div class="enemy-hp-fill" style="width:40%"></div></div>
                <span class="enemy-hp-text">HP 6/15</span>
                <span class="enemy-intent-box">ATK 5</span>
            </div>
            <div class="enemy-sprite">정찰 드론</div>
        </div>
    </div>

    <!-- 확정 -->
    <div class="confirm-area">
        <span class="combo-preview">ATK 2 + ATK 1 + ATK 1 = ATK 4</span>
        <button class="confirm-btn">확정</button>
    </div>

    <!-- 카드 -->
    <div class="card-fan">
        <div class="card card-atk selected">
            <div class="card-icon">A</div>
            <span class="card-value">2</span>
            <span class="card-type-label">ATTACK</span>
        </div>
        <div class="card card-blk">
            <div class="card-icon">B</div>
            <span class="card-value">1</span>
            <span class="card-type-label">BLOCK</span>
        </div>
        <div class="card card-atk selected">
            <div class="card-icon">A</div>
            <span class="card-value">1</span>
            <span class="card-type-label">ATTACK</span>
        </div>
        <div class="card card-hel">
            <div class="card-icon">H</div>
            <span class="card-value">2</span>
            <span class="card-type-label">HEAL</span>
        </div>
        <div class="card card-atk selected">
            <div class="card-icon">A</div>
            <span class="card-value">1</span>
            <span class="card-type-label">ATTACK</span>
        </div>
    </div>
</div>
</body>
</html>
